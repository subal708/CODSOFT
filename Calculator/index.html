<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./calculator-syle.css">
</head>

<body>
    <div class="calculator">

        <h2>Calculator</h2>

        <div id="display"><div class="result">0</div></div>

        <div class="buttons" id="buttons">

            <button class="operator clear">C</button>
            <button id="backpace">&#9003;</button>
            <button class="operator">÷</button>
            <button class="operator">×</button>
            

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="plus">+</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">−</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="equal">=</button>

            <button class="zero">0</button>
            <button>.</button>

        </div>

    </div>
    <script src="./calculator-logic.js"></script>
</body>

</html>
